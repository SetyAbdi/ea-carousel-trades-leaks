<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>5 Money Leaks — Entourage AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e1a;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif;
    color: #fff;
    min-height: 100vh;
    padding: 40px 20px 80px;
  }
  .wrap { max-width: 580px; margin: 0 auto; }
  .head {
    text-align: center;
    margin-bottom: 36px;
  }
  .logo {
    display: inline-flex; align-items: center; gap: 10px;
    margin-bottom: 16px;
  }
  .logo .dot {
    width: 32px; height: 32px; border-radius: 50%;
    background: #146EF5;
    display: flex; align-items: center; justify-content: center;
  }
  .logo .dot svg { width: 16px; height: 16px; }
  .logo .mark {
    font-size: 14px; font-weight: 800;
    letter-spacing: 1.4px;
  }
  .logo .mark .ai { color: #26B8FF; }
  h1 {
    font-size: 28px; font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .sub {
    font-size: 15px; font-weight: 500;
    color: rgba(255,255,255,0.6);
    line-height: 1.5;
  }
  .slides {
    display: flex; flex-direction: column;
    gap: 18px;
  }
  .slide-card {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 14px 40px rgba(0,0,0,0.4);
  }
  .slide-card img {
    width: 100%; display: block;
  }
  .slide-card .num {
    position: absolute;
    top: 14px; left: 14px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(8px);
    color: #fff;
    font-size: 11px; font-weight: 800;
    letter-spacing: 1.4px; text-transform: uppercase;
    padding: 6px 10px; border-radius: 6px;
  }
  .footer {
    text-align: center;
    margin-top: 48px;
    color: rgba(255,255,255,0.4);
    font-size: 13px;
  }
  .footer a { color: #26B8FF; text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="logo">
      <div class="dot">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M3 18 L12 4 L21 18 L17 18 L12 10 L7 18 Z" fill="white"/>
          <path d="M9 18 L15 18" stroke="white" stroke-width="2"/>
        </svg>
      </div>
      <div class="mark">ENTOURAGE <span class="ai">AI</span></div>
    </div>
    <h1>5 Profit Leaks · Trades</h1>
    <p class="sub">Instagram carousel preview · 10 slides</p>
  </div>

  <div class="slides">
    <div class="slide-card"><div class="num">1 / 10</div><img src="slide_01.png" alt="Slide 1"></div>
    <div class="slide-card"><div class="num">2 / 10</div><img src="slide_02.png" alt="Slide 2"></div>
    <div class="slide-card"><div class="num">3 / 10</div><img src="slide_03.png" alt="Slide 3"></div>
    <div class="slide-card"><div class="num">4 / 10</div><img src="slide_04.png" alt="Slide 4"></div>
    <div class="slide-card"><div class="num">5 / 10</div><img src="slide_05.png" alt="Slide 5"></div>
    <div class="slide-card"><div class="num">6 / 10</div><img src="slide_06.png" alt="Slide 6"></div>
    <div class="slide-card"><div class="num">7 / 10</div><img src="slide_07.png" alt="Slide 7"></div>
    <div class="slide-card"><div class="num">8 / 10</div><img src="slide_08.png" alt="Slide 8"></div>
    <div class="slide-card"><div class="num">9 / 10</div><img src="slide_09.png" alt="Slide 9"></div>
    <div class="slide-card"><div class="num">10 / 10</div><img src="slide_10.png" alt="Slide 10"></div>
  </div>

  <div class="footer">
    Internal preview · not indexed
  </div>
</div>
</body>
</html>
